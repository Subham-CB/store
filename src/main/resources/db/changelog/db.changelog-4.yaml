databaseChangeLog:
  - changeSet:
      id: 4-products
      author: de.subham1@gmail.com
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - createTable:
            tableName: order_product
            columns:
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_product_order
                    references: "order"(id)
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_product_product
                    references: product(id)
        - addPrimaryKey:
            tableName: order_product
            columnNames: order_id, product_id
            constraintName: pk_order_product